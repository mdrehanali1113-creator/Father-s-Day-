<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Father's Day, Papa!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            overflow: hidden;
            position: relative;
        }

        /* Floating background elements */
        .background-decor {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 1;
        }

        .star {
            position: absolute;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            animation: float Up 8s infinite linear;
        }

        /* Card Container */
        .card {
            background: rgba(255, 255, 255, 0.95);
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            text-align: center;
            max-width: 500px;
            width: 90%;
            z-index: 2;
            transform: translateY(0);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        /* Typography & Content */
        .badge {
            background: #e44d26;
            color: white;
            padding: 0.5rem 1.5rem;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: inline-block;
            margin-bottom: 1.5rem;
        }

        h1 {
            color: #1e3c72;
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }

        .main-message {
            font-size: 1.25rem;
            color: #333;
            line-height: 1.6;
            margin-bottom: 2rem;
            font-weight: 600;
        }

        .sub-text {
            color: #666;
            font-style: italic;
            font-size: 1rem;
            line-height: 1.5;
        }

        /* Decorative Heart */
        .heart-icon {
            color: #e44d26;
            font-size: 3rem;
            margin-top: 1.5rem;
            animation: pulse 1.5s infinite;
        }

        /* Animations */
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }

        @keyframes floatUp {
            0% {
                transform: translateY(100vh) scale(0);
                opacity: 0;
            }
            50% {
                opacity: 0.8;
            }
            100% {
                transform: translateY(-10vh) scale(1);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <!-- Decorative background elements -->
    <div class="background-decor">
        <div class="star" style="width: 20px; height: 20px; left: 10%; animation-duration: 6s;"></div>
        <div class="star" style="width: 15px; height: 15px; left: 25%; animation-duration: 9s; animation-delay: 2s;"></div>
        <div class="star" style="width: 30px; height: 30px; left: 70%; animation-duration: 7s; animation-delay: 1s;"></div>
        <div class="star" style="width: 10px; height: 10px; left: 85%; animation-duration: 5s; animation-delay: 3s;"></div>
    </div>

    <!-- Main Greeting Card -->
    <div class="card">
        <span class="badge">Celebrated with Love</span>
        <h1>Happy Father's Day</h1>
        
        <p class="main-message">
            Hello Papa. Thanks for all your efforts.
        </p>
        
        <p class="sub-text">
            Thank you for always being my guide, my anchor, and my biggest supporter. Today and every day, we celebrate you!
        </p>
        
        <div class="heart-icon">❤️</div>
    </div>

</body>
</html>
